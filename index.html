<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1628">
<title>קבוצת סופרין | כרטיס ביקור</title>

<meta property="og:title" content="קבוצת סופרין">
<meta property="og:description" content="כרטיס ביקור דיגיטלי">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg-page: #efece4;
  --bg-card: #fafaf7;
  --bg-soft: #f0ede4;
  --bg-white: #ffffff;
  --ink: #0a1628;
  --ink-soft: #1e3a5f;
  --muted: #6b6555;
  --gold: #c9b885;
  --gold-soft: rgba(201, 184, 133, 0.12);
  --gold-border: rgba(201, 184, 133, 0.3);
  --line: rgba(10, 22, 40, 0.08);
  --line-soft: rgba(10, 22, 40, 0.05);
  --shadow-sm: 0 1px 2px rgba(10, 22, 40, 0.04);
  --shadow-lg: 0 20px 60px -20px rgba(10, 22, 40, 0.15), 0 0 0 1px rgba(10, 22, 40, 0.04);
}

html, body {
  font-family: 'Heebo', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-page);
  color: var(--ink);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background:
    radial-gradient(circle at 20% 0%, rgba(201, 184, 133, 0.15), transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(30, 58, 95, 0.08), transparent 50%),
    var(--bg-page);
}

.container {
  width: 100%;
  max-width: 420px;
}

.hidden { display: none !important; }

/* ============== Language Toggle ============== */
.lang-toggle {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 50;
  display: flex;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px;
  box-shadow: var(--shadow-sm);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3px;
  /* Always RTL: עב on the right, EN on the left */
  direction: rtl;
}

.lang-toggle button {
  background: transparent;
  border: none;
  padding: 5px 11px;
  border-radius: 999px;
  cursor: pointer;
  color: var(--muted);
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: all 0.2s ease;
}

.lang-toggle button.active {
  background: var(--ink);
  color: var(--bg-card);
}

.lang-toggle button:not(.active):hover {
  color: var(--ink);
}

/* When in English */
html[lang="en"] .name {
  letter-spacing: 0;
}

/* Keep button order fixed (always WhatsApp left, Call right) regardless of direction */
.btn-grid {
  direction: rtl;
}

.socials {
  direction: rtl;
}

/* ================ Loading State ================ */
.loading-state {
  text-align: center;
  padding: 60px 20px;
  animation: fadeIn 0.3s ease;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--gold-border);
  border-top-color: var(--gold);
  border-radius: 50%;
  margin: 0 auto 20px;
  animation: spin 0.8s linear infinite;
}

.loading-text {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1.5px;
}

/* ================ Error State ================ */
.error-state {
  text-align: center;
  padding: 60px 30px;
  background: var(--bg-card);
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  animation: fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.error-icon {
  width: 64px;
  height: 64px;
  margin: 0 auto 20px;
  background: rgba(220, 38, 38, 0.08);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.error-title {
  font-size: 20px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 10px;
}

.error-message {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 24px;
}

.error-action {
  display: inline-block;
  padding: 10px 24px;
  background: var(--ink);
  color: var(--bg-card);
  text-decoration: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
}

/* ================ Card (Main UI) ================ */
.card {
  position: relative;
  background: var(--bg-card);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  animation: fadeUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.card-top {
  position: absolute;
  top: 0; right: 0; left: 0;
  height: 160px;
  background: linear-gradient(180deg, var(--bg-soft) 0%, var(--bg-card) 100%);
  pointer-events: none;
}

.card-top::after {
  content: "";
  position: absolute;
  top: 0; right: 0; left: 0; height: 100%;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(201, 184, 133, 0.15) 0px, transparent 1px),
    radial-gradient(circle at 80% 60%, rgba(201, 184, 133, 0.1) 0px, transparent 1px);
  background-size: 30px 30px, 50px 50px;
  opacity: 0.6;
}

.card-header {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 26px 0;
  z-index: 2;
  direction: rtl;
}

.brand-tag {
  font-size: 10px;
  letter-spacing: 2.5px;
  color: #8a8270;
  font-weight: 500;
}

.status {
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 7px;
  height: 7px;
  background: #16a34a;
  border-radius: 50%;
  position: relative;
}

.status-dot::after {
  content: "";
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: #16a34a;
  opacity: 0.3;
  animation: pulse 2s ease-in-out infinite;
}

.status-text {
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--muted);
  font-weight: 500;
}

.card-body {
  position: relative;
  padding: 60px 28px 32px;
  text-align: center;
  z-index: 2;
}

.avatar-wrap {
  position: relative;
  width: 132px;
  height: 132px;
  margin: 0 auto 24px;
}

.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(from 135deg, var(--gold) 0deg, transparent 90deg, var(--gold) 180deg, transparent 270deg, var(--gold) 360deg);
  opacity: 0.6;
  animation: spin 20s linear infinite;
}

.avatar {
  position: relative;
  width: 132px;
  height: 132px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--ink-soft), var(--ink));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  font-weight: 500;
  color: var(--bg-card);
  border: 4px solid var(--bg-card);
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.name {
  font-size: 28px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.2px;
  margin-bottom: 10px;
}

.title-row {
  margin-bottom: 12px;
}

.title-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  background: var(--gold-soft);
  border: 1px solid var(--gold-border);
  border-radius: 20px;
}

.title-text {
  font-size: 11px;
  color: #7a6a3d;
  letter-spacing: 1px;
  font-weight: 500;
}

.company-logo {
  display: inline-block;
  text-decoration: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  opacity: 0.85;
}

.company-logo:hover {
  opacity: 1;
  transform: translateY(-1px);
}

.company-logo img {
  height: 32px;
  width: auto;
  display: block;
}

/* ============== Office Address ============== */
.office-section {
  margin-top: 20px;
  padding: 14px 16px;
  background: rgba(201, 184, 133, 0.08);
  border: 1px solid rgba(201, 184, 133, 0.25);
  border-radius: 14px;
  text-align: right;
  direction: rtl;
}

.office-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 12px;
}

.office-icon {
  color: var(--gold);
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}

.office-text {
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.6;
  flex: 1;
}

.office-text .office-city {
  color: var(--muted);
  font-size: 11px;
}

.office-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.office-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 8px 10px;
  background: var(--bg-white);
  border: 1px solid var(--line);
  border-radius: 9px;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink);
  text-decoration: none;
  transition: all 0.2s ease;
  font-family: inherit;
}

.office-btn:hover {
  border-color: rgba(10, 22, 40, 0.18);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.office-btn:active {
  transform: scale(0.97);
}

.office-btn svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 28px 0;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(10, 22, 40, 0.12));
}

.divider-line.left {
  background: linear-gradient(-90deg, transparent, rgba(10, 22, 40, 0.12));
}

.divider-dot {
  width: 5px;
  height: 5px;
  background: var(--gold);
  border-radius: 50%;
  transform: rotate(45deg);
}

.btn-primary {
  width: 100%;
  background: var(--ink);
  color: var(--bg-card);
  border: none;
  padding: 16px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.3px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}

.btn-primary::before {
  content: "";
  position: absolute;
  top: 0; right: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(201, 184, 133, 0.2), transparent);
  transition: right 0.6s ease;
}

.btn-primary:hover::before { right: 100%; }
.btn-primary:active { transform: scale(0.98); }

.btn-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 22px;
}

.btn-secondary {
  background: var(--bg-white);
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 13px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  text-decoration: none;
}

.btn-secondary:hover {
  border-color: rgba(10, 22, 40, 0.2);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.btn-secondary:active { transform: scale(0.97); }

.socials {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.social-link {
  width: 48px;
  height: 48px;
  background: var(--bg-white);
  border: 1px solid var(--line);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.25s ease;
  text-decoration: none;
}

.social-link:hover {
  transform: translateY(-2px);
  border-color: rgba(10, 22, 40, 0.18);
  box-shadow: var(--shadow-sm);
}

.social-link svg {
  width: 21px;
  height: 21px;
}

.footer-tag {
  margin-top: 28px;
  font-size: 9px;
  color: #a8a193;
  letter-spacing: 2px;
  font-weight: 500;
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--ink);
  color: var(--bg-card);
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  z-index: 100;
  pointer-events: none;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ================ Animations ================ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.4); opacity: 0; }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media (max-width: 380px) {
  .card-body { padding: 56px 22px 28px; }
  .name { font-size: 24px; }
  .avatar-wrap, .avatar { width: 116px; height: 116px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>

        <div class="divider-dot"></div>

      </div>

<!-- Supabase JS Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ============================================
// CONFIGURATION
// ============================================
const SUPABASE_URL = 'https://kyjdveqvfyusvpsafmcm.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_5g82iLsXJvJfT-0GLTI9sQ_SiOsLy4T';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

// State
let currentEmployee = null;
let currentCompany = null;
let currentOffice = null;
let currentLang = 'he';

// ============================================
// TRANSLATIONS
// ============================================
const i18n = {
  he: {
    loading: 'טוען...',
    saveContact: 'שמור באנשי קשר',
    whatsapp: 'WhatsApp',
    call: 'התקשר',
    waze: 'Waze',
    maps: 'Maps',
    errorNotFoundTitle: 'כרטיס לא נמצא',
    errorNotFoundMsg: 'העובד שאתה מחפש לא קיים או אינו פעיל במערכת',
    errorNoUserTitle: 'לא צוין עובד',
    errorNoUserMsg: 'הקישור חסר פרמטר ?u= עם שם העובד',
    errorInvalidTitle: 'קישור לא תקין',
    errorInvalidMsg: 'שם המשתמש מכיל תווים לא חוקיים',
    errorSystemTitle: 'שגיאה במערכת',
    errorSystemMsg: 'לא ניתן לטעון את הגדרות החברה. נסה שוב מאוחר יותר',
    errorLoadTitle: 'שגיאה בטעינה',
    errorLoadMsg: 'לא ניתן לטעון את הכרטיס. בדוק את החיבור לאינטרנט ונסה שוב',
    errorAction: 'לאתר קבוצת סופרין',
    contactSaved: 'איש הקשר נשמר'
  },
  en: {
    loading: 'Loading...',
    saveContact: 'Save Contact',
    whatsapp: 'WhatsApp',
    call: 'Call',
    waze: 'Waze',
    maps: 'Maps',
    errorNotFoundTitle: 'Card Not Found',
    errorNotFoundMsg: 'The employee you are looking for does not exist or is not active',
    errorNoUserTitle: 'No User Specified',
    errorNoUserMsg: 'The link is missing the ?u= parameter with the employee username',
    errorInvalidTitle: 'Invalid Link',
    errorInvalidMsg: 'The username contains invalid characters',
    errorSystemTitle: 'System Error',
    errorSystemMsg: 'Unable to load company settings. Please try again later',
    errorLoadTitle: 'Loading Error',
    errorLoadMsg: 'Unable to load card. Check your internet connection and try again',
    errorAction: 'Visit Sufrin Group',
    contactSaved: 'Contact saved'
  }
};

function t(key) {
  return i18n[currentLang][key] || i18n.he[key] || key;
}

// ============================================
// LANGUAGE MANAGEMENT
// ============================================

function setLanguage(lang) {
  if (lang !== 'he' && lang !== 'en') return;
  currentLang = lang;
  
  // Update <html> attributes
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
  
  // Update toggle buttons active state
  document.getElementById('lang-he').classList.toggle('active', lang === 'he');
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  
  // Update all translatable static texts
  document.querySelector('.loading-text').textContent = t('loading');
  document.getElementById('btn-save-contact-text').textContent = t('saveContact');
  document.getElementById('whatsapp-text').textContent = t('whatsapp');
  document.getElementById('phone-text').textContent = t('call');
  
  // Update error if visible
  const errorEl = document.getElementById('error');
  if (!errorEl.classList.contains('hidden') && errorEl.dataset.titleKey) {
    document.getElementById('error-title').textContent = t(errorEl.dataset.titleKey);
    document.getElementById('error-message').textContent = t(errorEl.dataset.messageKey);
    document.querySelector('.error-action').textContent = t('errorAction');
  }
  
  // Re-render employee data if loaded
  if (currentEmployee && currentCompany) {
    renderEmployeeData();
  }
}

// ============================================
// MAIN: Load card data on page load
// ============================================
async function loadCard() {
  try {
    const params = new URLSearchParams(window.location.search);
    const username = params.get('u');

    if (!username) {
      showError('errorNoUserTitle', 'errorNoUserMsg');
      return;
    }

    if (!/^[a-z0-9_-]+$/i.test(username) || username.length > 30) {
      showError('errorInvalidTitle', 'errorInvalidMsg');
      return;
    }

    const [employeeResult, companyResult] = await Promise.all([
      sb.from('employees').select('*').eq('username', username).eq('is_active', true).single(),
      sb.from('company_settings').select('*').single()
    ]);

    if (employeeResult.error || !employeeResult.data) {
      showError('errorNotFoundTitle', 'errorNotFoundMsg');
      return;
    }

    if (companyResult.error || !companyResult.data) {
      showError('errorSystemTitle', 'errorSystemMsg');
      return;
    }

    currentEmployee = employeeResult.data;
    currentCompany = companyResult.data;
    
    // Load office if employee has one assigned
    if (currentEmployee.office_location_id) {
      try {
        const { data: officeData, error: officeError } = await sb
          .from('office_locations')
          .select('*')
          .eq('id', currentEmployee.office_location_id)
          .single();
        if (!officeError && officeData) {
          currentOffice = officeData;
        }
      } catch (e) {
        console.warn('Could not load office:', e);
      }
    }

    renderEmployeeData();
    
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('card').classList.remove('hidden');
    document.getElementById('lang-toggle').classList.remove('hidden');

  } catch (error) {
    console.error('Error loading card:', error);
    showError('errorLoadTitle', 'errorLoadMsg');
  }
}

// ============================================
// Render employee + company data
// ============================================
function renderEmployeeData() {
  const emp = currentEmployee;
  const company = currentCompany;
  
  // Decide which language fields to use (fallback to Hebrew)
  const displayName = (currentLang === 'en' && emp.full_name_en) ? emp.full_name_en : emp.full_name;
  const displayTitle = (currentLang === 'en' && emp.title_en) ? emp.title_en : emp.title;
  const displayCompany = (currentLang === 'en' && company.company_name_en) ? company.company_name_en : company.company_name;

  // Page title and Open Graph
  document.title = `${displayName} | ${displayCompany}`;
  document.querySelector('meta[property="og:title"]').setAttribute('content', `${displayName} | ${displayCompany}`);
  document.querySelector('meta[property="og:description"]').setAttribute('content', displayTitle);

  // Avatar
  const avatar = document.getElementById('avatar');
  if (emp.photo_url) {
    avatar.innerHTML = `<img src="${escapeHtml(emp.photo_url)}" alt="${escapeHtml(displayName)}">`;
  } else {
    avatar.innerHTML = `<span id="avatar-letter">${escapeHtml(displayName.charAt(0))}</span>`;
  }

  // Name & title
  document.getElementById('employee-name').textContent = displayName;
  document.getElementById('employee-title').textContent = displayTitle;

  // Company logo
  const logoLink = document.getElementById('company-logo-link');
  const logoImg = document.getElementById('company-logo-img');
  const logoText = document.getElementById('company-logo-text');
  
  logoLink.href = company.website_url || '#';
  
  if (company.logo_url) {
    logoImg.src = company.logo_url;
    logoImg.style.display = 'block';
    logoText.style.display = 'none';
  } else {
    logoImg.style.display = 'none';
    logoText.style.display = 'inline';
    logoText.textContent = displayCompany;
  }

  // Phone & WhatsApp
  const cleanPhone = emp.phone.replace(/[^0-9]/g, '');
  document.getElementById('whatsapp-link').href = `https://wa.me/${cleanPhone}`;
  document.getElementById('phone-link').href = `tel:${emp.phone}`;
  
  // Email
  document.getElementById('email-link').href = `mailto:${emp.email}`;

  // Social links
  if (company.instagram_url) document.getElementById('instagram-link').href = company.instagram_url;
  if (company.facebook_url) document.getElementById('facebook-link').href = company.facebook_url;
  if (company.linkedin_url) document.getElementById('linkedin-link').href = company.linkedin_url;
  
  // Update translatable button texts
  document.getElementById('btn-save-contact-text').textContent = t('saveContact');
  document.getElementById('whatsapp-text').textContent = t('whatsapp');
  document.getElementById('phone-text').textContent = t('call');
  
  // Render office address if available
  renderOfficeSection();
}

// ============================================
// Render office address section
// ============================================
function renderOfficeSection() {
  const officeSection = document.getElementById('office-section');
  
  if (!currentOffice) {
    officeSection.classList.add('hidden');
    return;
  }
  
  // Decide which language fields to use (fallback to Hebrew)
  const displayAddress = (currentLang === 'en' && currentOffice.address_line_en) 
    ? currentOffice.address_line_en 
    : currentOffice.address_line;
  const displayCity = (currentLang === 'en' && currentOffice.city_en) 
    ? currentOffice.city_en 
    : currentOffice.city;
  
  // Build the address text with line breaks
  const addressEl = document.getElementById('office-address');
  addressEl.innerHTML = `
    ${escapeHtml(displayAddress)}<br>
    <span class="office-city">${escapeHtml(displayCity)}</span>
  `;
  
  // Build navigation URLs
  // ALWAYS use the Hebrew address for navigation (more accurate in Israel)
  // even if displaying in English
  const navAddress = `${currentOffice.address_line}, ${currentOffice.city}`;
  const encodedAddress = encodeURIComponent(navAddress);
  
  // Waze: opens in app on mobile, web on desktop
  const wazeUrl = `https://waze.com/ul?q=${encodedAddress}&navigate=yes`;
  
  // Google Maps: works on all devices
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedAddress}`;
  
  document.getElementById('office-waze').href = wazeUrl;
  document.getElementById('office-maps').href = mapsUrl;
  
  // Show the section
  officeSection.classList.remove('hidden');
}

// ============================================
// Show error state
// ============================================
function showError(titleKey, messageKey) {
  const errorEl = document.getElementById('error');
  errorEl.dataset.titleKey = titleKey;
  errorEl.dataset.messageKey = messageKey;
  
  document.getElementById('error-title').textContent = t(titleKey);
  document.getElementById('error-message').textContent = t(messageKey);
  document.querySelector('.error-action').textContent = t('errorAction');
  
  document.getElementById('loading').classList.add('hidden');
  errorEl.classList.remove('hidden');
  document.getElementById('lang-toggle').classList.remove('hidden');
}

// ============================================
// Save contact as vCard
// ============================================
function saveContact() {
  if (!currentEmployee || !currentCompany) return;

  const emp = currentEmployee;
  const company = currentCompany;
  
  const displayName = (currentLang === 'en' && emp.full_name_en) ? emp.full_name_en : emp.full_name;
  const displayTitle = (currentLang === 'en' && emp.title_en) ? emp.title_en : emp.title;
  const displayCompany = (currentLang === 'en' && company.company_name_en) ? company.company_name_en : company.company_name;

  const nameParts = displayName.split(' ');
  const lastName = nameParts.length > 1 ? nameParts[nameParts.length - 1] : '';
  const firstName = nameParts.slice(0, -1).join(' ') || nameParts[0];

  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `N;CHARSET=UTF-8:${lastName};${firstName};;;`,
    `FN;CHARSET=UTF-8:${displayName}`,
    `ORG;CHARSET=UTF-8:${displayCompany}`,
    `TITLE;CHARSET=UTF-8:${displayTitle}`,
    `TEL;TYPE=CELL,VOICE:${emp.phone}`,
    `EMAIL;TYPE=WORK:${emp.email}`,
    company.instagram_url ? `URL;TYPE=Instagram:${company.instagram_url}` : null,
    company.linkedin_url ? `URL;TYPE=LinkedIn:${company.linkedin_url}` : null,
    company.facebook_url ? `URL;TYPE=Facebook:${company.facebook_url}` : null,
    company.website_url ? `URL;TYPE=Company:${company.website_url}` : null,
    'END:VCARD'
  ].filter(Boolean).join('\r\n');

  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  
  const fileName = (currentLang === 'en' && emp.full_name_en)
    ? emp.full_name_en.replace(/\s+/g, '-')
    : displayName.replace(/\s+/g, '-');
  link.download = `${fileName}.vcf`;
  
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  showToast(t('contactSaved'));
}

// ============================================
// Helpers
// ============================================
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================
// Start
// ============================================
setLanguage('he');
loadCard();
</script>
