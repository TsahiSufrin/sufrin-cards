<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg-page: #efece4;
  --bg-card: #fafaf7;
  --bg-soft: #f0ede4;
  --bg-white: #ffffff;
  --ink: #0a1628;
  --ink-soft: #1e3a5f;
  --muted: #6b6555;
  --gold: #c9b885;
  --gold-soft: rgba(201, 184, 133, 0.12);
  --gold-border: rgba(201, 184, 133, 0.3);
  --line: rgba(10, 22, 40, 0.08);
  --line-soft: rgba(10, 22, 40, 0.05);
  --shadow-sm: 0 1px 2px rgba(10, 22, 40, 0.04);
  --shadow-lg: 0 20px 60px -20px rgba(10, 22, 40, 0.15), 0 0 0 1px rgba(10, 22, 40, 0.04);
}

html, body {
  font-family: 'Heebo', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-page);
  color: var(--ink);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background:
    radial-gradient(circle at 20% 0%, rgba(201, 184, 133, 0.15), transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(30, 58, 95, 0.08), transparent 50%),
    var(--bg-page);
}

.container {
  width: 100%;
  max-width: 420px;
}

/* ================ Loading State ================ */
.loading-state {
  text-align: center;
  padding: 60px 20px;
  animation: fadeIn 0.3s ease;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--gold-border);
  border-top-color: var(--gold);
  border-radius: 50%;
  margin: 0 auto 20px;
  animation: spin 0.8s linear infinite;
}

.loading-text {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1.5px;
}

/* ================ Error State ================ */
.error-state {
  text-align: center;
  padding: 60px 30px;
  background: var(--bg-card);
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  animation: fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.error-icon {
  width: 64px;
  height: 64px;
  margin: 0 auto 20px;
  background: rgba(220, 38, 38, 0.08);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.error-title {
  font-size: 20px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 10px;
}

.error-message {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 24px;
}

.error-action {
  display: inline-block;
  padding: 10px 24px;
  background: var(--ink);
  color: var(--bg-card);
  text-decoration: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
}

/* ================ Card (Main UI) ================ */
.card {
  position: relative;
  background: var(--bg-card);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  animation: fadeUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.card-top {
  position: absolute;
  top: 0; right: 0; left: 0;
  height: 160px;
  background: linear-gradient(180deg, var(--bg-soft) 0%, var(--bg-card) 100%);
  pointer-events: none;
}

.card-top::after {
  content: "";
  position: absolute;
  top: 0; right: 0; left: 0; height: 100%;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(201, 184, 133, 0.15) 0px, transparent 1px),
    radial-gradient(circle at 80% 60%, rgba(201, 184, 133, 0.1) 0px, transparent 1px);
  background-size: 30px 30px, 50px 50px;
  opacity: 0.6;
}

.card-header {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 26px 0;
  z-index: 2;
}

.brand-tag {
  font-size: 10px;
  letter-spacing: 2.5px;
  color: #8a8270;
  font-weight: 500;
}

.status {
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 7px;
  height: 7px;
  background: #16a34a;
  border-radius: 50%;
  position: relative;
}

.status-dot::after {
  content: "";
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: #16a34a;
  opacity: 0.3;
  animation: pulse 2s ease-in-out infinite;
}

.status-text {
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--muted);
  font-weight: 500;
}

.card-body {
  position: relative;
  padding: 60px 28px 32px;
  text-align: center;
  z-index: 2;
}

.avatar-wrap {
  position: relative;
  width: 132px;
  height: 132px;
  margin: 0 auto 24px;
}

.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(from 135deg, var(--gold) 0deg, transparent 90deg, var(--gold) 180deg, transparent 270deg, var(--gold) 360deg);
  opacity: 0.6;
  animation: spin 20s linear infinite;
}

.avatar {
  position: relative;
  width: 132px;
  height: 132px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--ink-soft), var(--ink));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  font-weight: 500;
  color: var(--bg-card);
  border: 4px solid var(--bg-card);
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.name {
  font-size: 28px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.2px;
  margin-bottom: 10px;
}

.title-row {
  margin-bottom: 12px;
}

.title-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  background: var(--gold-soft);
  border: 1px solid var(--gold-border);
  border-radius: 20px;
}

.title-text {
  font-size: 11px;
  color: #7a6a3d;
  letter-spacing: 1px;
  font-weight: 500;
}

.company-logo {
  display: inline-block;
  text-decoration: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  opacity: 0.85;
}

.company-logo:hover {
  opacity: 1;
  transform: translateY(-1px);
}

.company-logo img {
  height: 32px;
  width: auto;
  display: block;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 28px 0;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(10, 22, 40, 0.12));
}

.divider-line.left {
  background: linear-gradient(-90deg, transparent, rgba(10, 22, 40, 0.12));
}

.divider-dot {
  width: 5px;
  height: 5px;
  background: var(--gold);
  border-radius: 50%;

}

.btn-primary {
  width: 100%;
  background: var(--ink);
  color: var(--bg-card);
  border: none;
  padding: 16px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.3px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}

.btn-primary::before {
  content: "";
  position: absolute;
  top: 0; right: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(201, 184, 133, 0.2), transparent);
  transition: right 0.6s ease;
}

.btn-primary:hover::before { right: 100%; }
.btn-primary:active { transform: scale(0.98); }

.btn-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 22px;
}

.btn-secondary {
  background: var(--bg-white);
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 13px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  text-decoration: none;
}

.btn-secondary:hover {
  border-color: rgba(10, 22, 40, 0.2);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.btn-secondary:active { transform: scale(0.97); }

.socials {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.social-link {
  width: 48px;
  height: 48px;
  background: var(--bg-white);
  border: 1px solid var(--line);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.25s ease;
  text-decoration: none;
}

.social-link:hover {
  transform: translateY(-2px);
  border-color: rgba(10, 22, 40, 0.18);
  box-shadow: var(--shadow-sm);
}

.social-link svg {
  width: 21px;
  height: 21px;
}

.footer-tag {
  margin-top: 28px;
  font-size: 9px;
  color: #a8a193;
  letter-spacing: 2px;
  font-weight: 500;
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--ink);
  color: var(--bg-card);
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  z-index: 100;
  pointer-events: none;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ================ Animations ================ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.4); opacity: 0; }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media (max-width: 380px) {
  .card-body { padding: 56px 22px 28px; }
  .name { font-size: 24px; }
  .avatar-wrap, .avatar { width: 116px; height: 116px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

.hidden { display: none !important; }
</style>

<script>
// ============================================
// CONFIGURATION
// ============================================
const SUPABASE_URL = 'https://kyjdveqvfyusvpsafmcm.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_5g82iLsXJvJfT-0GLTI9sQ_SiOsLy4T';

// Initialize Supabase client
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

// State
let currentEmployee = null;
let currentCompany = null;

// ============================================
// MAIN: Load card data on page load
// ============================================
async function loadCard() {
  try {
    // Get username from URL: ?u=tsahi
    const params = new URLSearchParams(window.location.search);
    const username = params.get('u');

    if (!username) {
      showError('לא צוין עובד', 'הקישור חסר פרמטר ?u= עם שם העובד');
      return;
    }

    // Validate username format (security)
    if (!/^[a-z0-9_-]+$/i.test(username) || username.length > 30) {
      showError('קישור לא תקין', 'שם המשתמש מכיל תווים לא חוקיים');
      return;
    }

    // Fetch employee + company settings in parallel
    const [employeeResult, companyResult] = await Promise.all([
      sb.from('employees')
        .select('*')
        .eq('username', username)
        .eq('is_active', true)
        .single(),
      sb.from('company_settings')
        .select('*')
        .single()
    ]);

    // Handle employee fetch errors
    if (employeeResult.error || !employeeResult.data) {
      showError('כרטיס לא נמצא', 'העובד שאתה מחפש לא קיים או אינו פעיל במערכת');
      return;
    }

    if (companyResult.error || !companyResult.data) {
      showError('שגיאה במערכת', 'לא ניתן לטעון את הגדרות החברה. נסה שוב מאוחר יותר');
      return;
    }

    currentEmployee = employeeResult.data;
    currentCompany = companyResult.data;

    renderCard();

  } catch (error) {
    console.error('Error loading card:', error);
    showError('שגיאה בטעינה', 'לא ניתן לטעון את הכרטיס. בדוק את החיבור לאינטרנט ונסה שוב');
  }
}

// ============================================
// Render the card with employee + company data
// ============================================
function renderCard() {
  const emp = currentEmployee;
  const company = currentCompany;

  // Update page title
  document.title = `${emp.full_name} | ${company.company_name}`;
  document.querySelector('meta[property="og:title"]').setAttribute('content', `${emp.full_name} | ${company.company_name}`);
  document.querySelector('meta[property="og:description"]').setAttribute('content', emp.title);

  // Avatar
  const avatarLetter = document.getElementById('avatar-letter');
  if (emp.photo_url) {
    document.getElementById('avatar').innerHTML = `<img src="${escapeHtml(emp.photo_url)}" alt="${escapeHtml(emp.full_name)}">`;
  } else {
    // Use first letter of Hebrew name
    avatarLetter.textContent = emp.full_name.charAt(0);
  }

  // Name & title
  document.getElementById('employee-name').textContent = emp.full_name;
  document.getElementById('employee-title').textContent = emp.title;

  // Company logo (or text fallback)
  const logoLink = document.getElementById('company-logo-link');
  const logoImg = document.getElementById('company-logo-img');
  const logoText = document.getElementById('company-logo-text');
  
  logoLink.href = company.website_url || '#';
  
  if (company.logo_url) {
    logoImg.src = company.logo_url;
    logoImg.style.display = 'block';
    logoText.style.display = 'none';
  } else {
    logoImg.style.display = 'none';
    logoText.style.display = 'inline';
    logoText.textContent = company.company_name;
  }

  // Phone & WhatsApp (clean phone for WhatsApp - remove + and dashes)
  const cleanPhone = emp.phone.replace(/[^0-9]/g, '');
  document.getElementById('whatsapp-link').href = `https://wa.me/${cleanPhone}`;
  document.getElementById('phone-link').href = `tel:${emp.phone}`;

  // Email
  document.getElementById('email-link').href = `mailto:${emp.email}`;

  // Social links (from company settings)
  if (company.instagram_url) document.getElementById('instagram-link').href = company.instagram_url;
  if (company.facebook_url) document.getElementById('facebook-link').href = company.facebook_url;
  if (company.linkedin_url) document.getElementById('linkedin-link').href = company.linkedin_url;

  // Show the card, hide loading
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('card').classList.remove('hidden');
}

// ============================================
// Show error state
// ============================================
function showError(title, message) {
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-message').textContent = message;
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('error').classList.remove('hidden');
}

// ============================================
// Save contact as vCard
// ============================================
function saveContact() {
  if (!currentEmployee || !currentCompany) return;

  const emp = currentEmployee;
  const company = currentCompany;

  // Split full name into first/last (best effort)
  const nameParts = emp.full_name.split(' ');
  const lastName = nameParts.length > 1 ? nameParts[nameParts.length - 1] : '';
  const firstName = nameParts.slice(0, -1).join(' ') || nameParts[0];

  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `N;CHARSET=UTF-8:${lastName};${firstName};;;`,
    `FN;CHARSET=UTF-8:${emp.full_name}`,
    `ORG;CHARSET=UTF-8:${company.company_name}`,
    `TITLE;CHARSET=UTF-8:${emp.title}`,
    `TEL;TYPE=CELL,VOICE:${emp.phone}`,
    `EMAIL;TYPE=WORK:${emp.email}`,
    company.instagram_url ? `URL;TYPE=Instagram:${company.instagram_url}` : null,
    company.linkedin_url ? `URL;TYPE=LinkedIn:${company.linkedin_url}` : null,
    company.facebook_url ? `URL;TYPE=Facebook:${company.facebook_url}` : null,
    company.website_url ? `URL;TYPE=Company:${company.website_url}` : null,
    'END:VCARD'
  ].filter(Boolean).join('\r\n');

  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${emp.full_name.replace(/\s+/g, '-')}.vcf`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  showToast('איש הקשר נשמר');
}

// ============================================
// Helpers
// ============================================
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================
// Start
// ============================================
loadCard();
</script>
